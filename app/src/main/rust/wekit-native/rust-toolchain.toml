# Pinned Rust toolchain for reproducible builds.
# Keep in sync with reproducible/Containerfile (RUST_VERSION) and CI.
# Stable is used deliberately: the previous nightly-only feature
# (`abort_immediate`) was removed in favor of std::process::abort().
[toolchain]
channel = "1.96.1"
targets = [
    "aarch64-linux-android",
    "armv7-linux-androideabi",
    "x86_64-linux-android",
    "i686-linux-android",
]
profile = "minimal"
